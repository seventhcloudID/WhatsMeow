# Contoh reverse proxy untuk aaPanel / Nginx
# Domain: meow.solusijasa.com
# Backend: http://127.0.0.1:8081
#
# aaPanel: Website > meow.solusijasa.com > Config > Reverse Proxy
#   Target URL: http://127.0.0.1:8081
#   Enable: Send Domain, WebSocket (opsional)
#
# Atau tempel di dalam block server { }:

location / {
    proxy_pass http://127.0.0.1:8081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

# Jika pakai SSL (Let's Encrypt via aaPanel), pastikan HTTPS sudah aktif.
# Gateway listen di localhost saja — tidak perlu expose port 8081 ke publik.
